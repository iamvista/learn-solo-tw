<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跳轉至付款頁面...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0A0A0A;
      color: white;
    }
    .container { text-align: center; padding: 2rem; }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      border-top: 4px solid #F5A524;
      width: 48px;
      height: 48px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: rgba(255,255,255,0.6); }
    .error { color: #ef4444; display: none; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h1>正在跳轉至付款頁面</h1>
    <p>請稍候，系統正在處理您的訂單...</p>
    <p class="error" id="error"></p>
  </div>

  <form id="paymentForm" method="POST" style="display: none;">
    <input type="hidden" name="MerID" id="MerID">
    <input type="hidden" name="Version" id="Version">
    <input type="hidden" name="EncryptInfo" id="EncryptInfo">
    <input type="hidden" name="HashInfo" id="HashInfo">
  </form>

  <script>
    (function() {
      try {
        var urlParams = new URLSearchParams(window.location.search);
        var apiUrl = urlParams.get('apiUrl');
        var merID = urlParams.get('MerID');
        var version = urlParams.get('Version');
        var encryptInfo = urlParams.get('EncryptInfo');
        var hashInfo = urlParams.get('HashInfo');

        if (!apiUrl || !merID || !encryptInfo || !hashInfo) {
          throw new Error('缺少必要的付款參數');
        }

        document.getElementById('MerID').value = merID;
        document.getElementById('Version').value = version || '1.0';
        document.getElementById('EncryptInfo').value = decodeURIComponent(encryptInfo);
        document.getElementById('HashInfo').value = decodeURIComponent(hashInfo);

        var form = document.getElementById('paymentForm');
        form.action = apiUrl;

        setTimeout(function() { form.submit(); }, 500);
      } catch (error) {
        document.getElementById('spinner').style.display = 'none';
        var errorEl = document.getElementById('error');
        errorEl.style.display = 'block';
        errorEl.textContent = '付款跳轉失敗：' + error.message;
      }
    })();
  </script>
</body>
</html>
